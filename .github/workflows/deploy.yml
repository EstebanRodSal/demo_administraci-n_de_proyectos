name: CI/CD - ArteScena

on:
  push:
    branches: [main]        # se activa en cada push a main
  pull_request:
    branches: [main]        # también corre en PRs

jobs:

  # ── FASE CI: Validar el HTML ──────────────────────────
  validar:
    name: Validar HTML
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar validador de HTML
        run: |
          npm install -g html-validate

      - name: Validar index.html
        run: html-validate index.html

  # ── FASE CD: Desplegar en GitHub Pages ───────────────
  desplegar:
    name: Desplegar
    runs-on: ubuntu-latest
    needs: validar            # solo corre si CI pasó
    if: github.ref == 'refs/heads/main'   # solo en push a main, no en PRs

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir archivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'           # sube todo el contenido de la raíz

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4